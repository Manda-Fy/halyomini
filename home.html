<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halyo - Where unsaid words finally belong</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
    <link rel="stylesheet" href="/static/home.css">
</head>
<body>
    <div class="stars-container">
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
    </div>
    
    <div class="radial-gradient"></div>
    
    <main class="home-container">
        <div class="content">
            <h1 class="brand-name">
                <span class="letter">H</span>
                <span class="letter">a</span>
                <span class="letter">l</span>
                <span class="letter">y</span>
                <span class="letter">o</span>
            </h1>
            
            <p class="tagline">Where unsaid words finally belong</p>
            
            <button class="cta-button" id="beginJourney">
                <span>Commencer</span>
                <div class="button-glow"></div>
            </button>
            
            <!-- Bouton pour récupérer avec code -->
            <button class="secondary-button" id="recoverBtn">
                <span>J'ai déjà un code</span>
            </button>
        </div>
    </main>
    
    <!-- Modal de récupération -->
    <div class="recover-modal" id="recoverModal">
        <div class="recover-content">
            <button class="close-modal" id="closeRecoverBtn">&times;</button>
            <h2>Retrouver mes messages</h2>
            <p>Entre ton code de récupération pour accéder à tes conversations</p>
            <form id="recoverForm">
                <input 
                    type="text" 
                    id="recoveryCodeInput" 
                    placeholder="XXXXXX" 
                    maxlength="8"
                    required
                >
                <button type="submit" class="submit-recover">
                    <span>Retrouver</span>
                    <div class="button-glow"></div>
                </button>
            </form>
            <div class="recover-error" id="recoverError"></div>
        </div>
    </div>
    
    <script src="/static/home.js"></script>
</body>
</html>
