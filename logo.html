<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halyo - Eclipse de Soie</title>
    <link rel="stylesheet" href="/static/logo.css">
</head>
<body>
    <div class="logo-container">
        <svg class="eclipse-logo" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="glow">
                    <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
                    <feMerge>
                        <feMergeNode in="coloredBlur"/>
                        <feMergeNode in="SourceGraphic"/>
                    </feMerge>
                </filter>
                <radialGradient id="innerGradient">
                    <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#0f0f1a;stop-opacity:1" />
                </radialGradient>
            </defs>
            
            <!-- Inner circle -->
            <circle cx="150" cy="150" r="120" fill="url(#innerGradient)" />
            
            <!-- Glowing outline -->
            <circle 
                class="eclipse-ring" 
                cx="150" 
                cy="150" 
                r="120" 
                fill="none" 
                stroke="#ff7eb9" 
                stroke-width="2.5" 
                filter="url(#glow)"
                stroke-dasharray="754"
                stroke-dashoffset="754"
            />
        </svg>
    </div>
    
    <script src="/static/logo.js"></script>
</body>
</html>
